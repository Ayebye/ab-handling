name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"embeds\": [{\"title\": \"${{ github.event.release.name }}\", \"description\": \"**Ny opdatering!**\n\nVersion: ${{ github.event.release.tag_name }}\", \"color\": 3066993}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}
