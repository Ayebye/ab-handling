name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python3 -c "
          import json, os, urllib.request
          payload = {
            'embeds': [{
              'title': '🔧 ' + os.environ['REPO_NAME'] + ' - ' + os.environ['RELEASE_NAME'],
              'description': '**New Update Released!**\n\nVersion: ' + os.environ['RELEASE_TAG'] + '\n\n' + os.environ['RELEASE_BODY'],
              'color': 3066993
            }]
          }
          data = json.dumps(payload).encode()
          req = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          "
